<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foods | CaribbeanFit</title>
  <link rel="stylesheet" href="../styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="navbar">
    <div class="logo">CaribbeanFit</div>

    <nav>
      <a href="../index.html">Home</a>
      <a href="foods.html">Foods</a>
      <a href="../index.html#exercises">Exercises</a>
      <a href="workouts.html">Workouts</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="favorites.html">Favorites</a>
    </nav>

    <div class="nav-actions">
      <span id="userStatus" class="user-status">Guest</span>
      <button id="loginBtn" class="btn-primary">Login</button>
    </div>
  </header>

  <main class="page-main">
    <section class="page-hero">
      <p class="tag">Eat better</p>
      <h1>Caribbean Food Library</h1>
      <p class="subtitle">
        Browse local foods, view macros, and save your favorites.
      </p>
    </section>

    <section class="section">
      <div class="section-header">
        <h2>All Foods</h2>
        <p>Search and explore your Caribbean nutrition database.</p>
      </div>

      <div class="foods-search-row">
        <input
          type="text"
          id="foodSearchInput"
          class="search-input"
          placeholder="Search foods by name..."
        />

        <select id="foodCategoryFilter" class="search-input">
          <option value="all">All Categories</option>
        </select>
      </div>

      <div id="foodsLibraryContainer" class="card-grid"></div>
    </section>
  </main>

  <footer class="footer">
    <p>CaribbeanFit © 2026</p>
  </footer>

  <script src="../auth.js"></script>
  <script src="../foods.js"></script>
</body>
</html>
