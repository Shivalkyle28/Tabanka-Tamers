<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nutrition | Tabanka Tamers</title>
  <link rel="icon" href="../assets/images/favicon.ico">
  <link rel="stylesheet" href="../styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

  <header class="navbar">
    <div class="logo">
    <img src="../assets/images/logo.png" alt="Tabanka Tamers logo" class="logo-img">
    <span>Tabanka Tamers</span>
    </div>

    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="workouts.html">Workouts</a>
      <a href="nutrition.html">Nutrition</a>
      <a href="favorites.html">Favorites</a>
      <a href="progress.html">Progress</a>
      <a href="profile.html">Profile</a>
    </nav>

    <div class="nav-actions">
      <span id="userStatus" class="user-status">Guest</span>
      <button id="logoutBtn" class="btn-secondary">Logout</button>
    </div>
  </header>

  <main class="page-main">
    <section class="page-hero">
      <p class="tag">Fuel smarter</p>
      <h1>Nutrition & Recipes</h1>
      <p class="subtitle">
        Search, filter, and explore Caribbean meals. Guests can browse freely, while nutrition stats and tracking are available after login.
      </p>
    </section>

    <section class="section">
      <div class="nutrition-search-card">
        <div class="nutrition-search-row">
          <input
            id="recipeSearchInput"
            class="search-input"
            placeholder="Search recipes..."
          />
          <button id="recipeSearchBtn" class="btn-primary">Search</button>
        </div>

        <div class="chip-row">
          <button class="chip-btn active-chip" data-filter="all">All</button>
          <button class="chip-btn" data-filter="protein">High Protein</button>
          <button class="chip-btn" data-filter="lowcarb">Low Carb</button>
        </div>
      </div>
    </section>

    <section class="section">
      <div id="nutritionCardsContainer" class="nutrition-grid"></div>
    </section>

    <section class="section">
      <div id="paginationContainer" class="pagination-row"></div>
    </section>
  </main>

  <div id="recipeModal" class="recipe-modal hidden">
    <div class="recipe-modal-content">
      <button id="closeRecipeModal" class="recipe-close-btn" type="button">&times;</button>
      <div id="recipeModalBody"></div>
    </div>
  </div>

  <footer class="footer">
    <p>Tabanka Tamers © 2026</p>
  </footer>

  <script src="../auth.js"></script>
  <script src="../nutrition.js"></script>
</body>
</html>
