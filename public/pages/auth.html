<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Tabanka Tamers</title>
  <link rel="icon" href="../assets/images/favicon.ico">
  <link rel="stylesheet" href="../styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="navbar">
    <div class="logo">
    <img src="../assets/images/logo.png" alt="Tabanka Tamers logo" class="logo-img">
    <span>Tabanka Tamers</span>
    </div>

    <nav>
      <a href="../index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="workouts.html">Workouts</a>
      <a href="nutrition.html">Nutrition</a>
      <a href="favorites.html">Favorites</a>
      <a href="progress.html">Progress</a>
      <a href="profile.html">Profile</a>
    </nav>

    <a href="../index.html" class="btn-secondary">Back</a>
  </header>

  <main class="auth-page">
    <section class="auth-wrapper">
      <div class="auth-intro">
        <p class="tag">Welcome back</p>
        <h1>Join Tabanka</h1>
        <p class="subtitle">
          Track your favorite foods, save exercises, and build your fitness dashboard.
        </p>
      </div>

      <div class="auth-card">
        <div class="auth-tabs">
          <button id="showLoginBtn" class="tab-btn active-tab" type="button">Login</button>
          <button id="showSignupBtn" class="tab-btn" type="button">Sign Up</button>
        </div>

        <form id="loginForm" class="auth-form">
          <h2>Login</h2>

          <label for="loginIdentifier">Username or Email</label>
          <input type="text" id="loginIdentifier" placeholder="Enter username or email" required />

          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required />

          <button type="submit" class="btn-primary auth-submit">Login</button>
          <p id="loginMessage" class="form-message"></p>
        </form>

        <form id="signupForm" class="auth-form hidden">
          <h2>Create Account</h2>

          <label for="signupUsername">Username</label>
          <input type="text" id="signupUsername" placeholder="Choose a username" required />

          <label for="signupEmail">Email</label>
          <input type="email" id="signupEmail" placeholder="Enter your email" required />

          <label for="signupPassword">Password</label>
          <input type="password" id="signupPassword" placeholder="Create a password" required />

          <button type="submit" class="btn-primary auth-submit">Sign Up</button>
          <p id="signupMessage" class="form-message"></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>Tabanka Tamers © 2026</p>
  </footer>

  <script src="../auth.js"></script>
</body>
</html>
